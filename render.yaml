services:
  - type: web
    name: arenda-ru
    env: python
    plan: starter
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:application

databases:
  - name: arenda-ru-db
    engine: mysql
    version: "8"
    plan: starter
    databaseName: arenda_ru
    userName: arenda_user
    userPassword: "your_db_password"
